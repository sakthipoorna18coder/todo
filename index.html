<!DOCTYPE html>
<html>
<head>
<title>To-do App</title>

<link rel="stylesheet" type="text/css" href="style.css">

<style>
h1 {
    text-align: center;
    color: chocolate;
    font-size:45px;
}

body {
    height: 100vh;              
    display: flex;
    flex-direction: column;
    justify-content: center;   
    align-items: center;     
    margin: 0;
    background: linear-gradient(135deg, #0f2027, #6a0572, #ff4b8b);
}

</style>

</head>

<body>

<h1>To Do</h1>

<div class="card">
<form action="td.html" method="GET">
    <h2>Enter Your Name</h2>
    <input type="text" name="name" placeholder="Type your name" required>
    <br>
    <button type="submit">Next</button>
</form>
</div>

</body>
</html>
